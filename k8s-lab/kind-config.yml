kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: curso-k8s
nodes:
# Control plane node con puertos 80 y 443 mapeados para Ingress
- role: control-plane
  extraPortMappings:
  - containerPort: 80
    hostPort: 80
    protocol: TCP
  - containerPort: 443
    hostPort: 443
    protocol: TCP
# Workers
- role: worker
- role: worker
