apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  APP_ENV: "development"
  APP_PORT: "3000"
  LOG_LEVEL: "debug"
  DB_HOST: "postgres-service"
  DB_PORT: "5432"
  DB_NAME: "tasksdb"
  app.json: |
    {
      "pagination": { "defaultLimit": 20, "maxLimit": 100 },
      "features": { "registration": true }
    }
