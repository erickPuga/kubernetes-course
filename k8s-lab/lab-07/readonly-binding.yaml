apiVersion: v1
kind: ServiceAccount
metadata:
  name: monitoring-sa
  namespace: app-prod
---
# Usar ClusterRole "view" predefinido (solo lectura en el namespace)
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: monitoring-view-binding
  namespace: app-prod
subjects:
- kind: ServiceAccount
  name: monitoring-sa
  namespace: app-prod
roleRef:
  kind: ClusterRole
  name: view
  apiGroup: rbac.authorization.k8s.io
