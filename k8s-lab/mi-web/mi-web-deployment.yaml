apiVersion: apps/v1
kind: Deployment
metadata:
  name: mi-web
  labels:
    app: mi-web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mi-web
  template:
    metadata:
      labels:
        app: mi-web
    spec:
      containers:
      - name: mi-web
        image: mi-web:v1.2
        imagePullPolicy: Never
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: mi-web-service
spec:
  selector:
    app: mi-web
  ports:
  - port: 80
    targetPort: 80
  type: ClusterIP
